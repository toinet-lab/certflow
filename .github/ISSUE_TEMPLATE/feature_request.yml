name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed idea
      description: What would you like CertRenova Probe to do?
    validations:
      required: false
  - type: dropdown
    id: phase
    attributes:
      label: Which phase does this relate to?
      options:
        - "Phase 0 (read-only inventory)"
        - "Phase 1 (issuance)"
        - "Phase 2 (distribution)"
        - "Phase 3 (policy / dashboard)"
        - "Not sure"
    validations:
      required: false
